name: Lint Codebase

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy -r requirements.txt

    - name: Ruff Check
      run: ruff check .

    - name: Black Check
      run: black --check .

    - name: isort Check
      run: isort --check-only .

    - name: MyPy Static Analysis
      run: mypy drygram
